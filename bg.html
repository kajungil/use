<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦎 게코 빙고</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap");
:root{--jungle:#1a2e1a;--leaf:#2d5a27;--lime:#7ec850;--gold:#f5c842;--amber:#e8963a;--coral:#e85c5c;--sky:#5cc8e8;--cream:#fdf6e3;--border:rgba(126,200,80,0.3);--glow:0 0 20px rgba(126,200,80,0.4);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:var(--jungle);color:var(--cream);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 50%,rgba(45,90,39,0.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(126,200,80,0.1) 0%,transparent 50%),repeating-linear-gradient(60deg,transparent,transparent 40px,rgba(45,90,39,0.08) 40px,rgba(45,90,39,0.08) 41px);}
.screen{display:none;min-height:100vh;padding:20px}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
input,select,textarea{width:100%;background:rgba(0,0,0,0.35);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--cream);font-family:"Noto Sans KR",sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:0;}
input:focus,select:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(126,200,80,0.15);}
.lobby-card{background:rgba(20,40,20,0.85);border:2px solid var(--lime);border-radius:24px;padding:32px;width:100%;max-width:400px;box-shadow:var(--glow),0 20px 60px rgba(0,0,0,0.5);}
.gecko-img{display:block;margin:0 auto 12px;width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(126,200,80,0.5));animation:geckoFloat 3s ease-in-out infinite;}
@keyframes geckoFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
h1.title{font-family:"Jua",sans-serif;font-size:2.2rem;text-align:center;color:var(--lime);text-shadow:0 0 30px rgba(126,200,80,0.6);margin-bottom:3px;}
.subtitle{text-align:center;color:rgba(255,255,255,0.5);font-size:0.82rem;margin-bottom:22px;}
.field-group{margin-bottom:14px;}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:14px;font-family:"Jua",sans-serif;font-size:1.05rem;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,opacity 0.2s;}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-primary{background:linear-gradient(135deg,var(--lime),#5aad30);color:#0f1f0f;box-shadow:0 4px 20px rgba(126,200,80,0.35);margin-bottom:10px;}
.btn-secondary{background:linear-gradient(135deg,var(--amber),#c97820);color:#fff;box-shadow:0 4px 20px rgba(232,150,58,0.3);margin-bottom:10px;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--cream);}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:rgba(255,255,255,0.3);font-size:0.8rem;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.1);}
.error-msg{color:var(--coral);font-size:0.82rem;text-align:center;margin-top:6px;min-height:18px;}
.input-row{display:flex;gap:8px;align-items:stretch;}
.input-row input{flex:1;margin-bottom:0;}
.btn-inline{padding:10px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--sky),#3aabe8);color:#0f2030;font-family:"Jua",sans-serif;font-size:0.95rem;cursor:pointer;white-space:nowrap;transition:transform 0.15s;}
.btn-inline:hover{transform:translateY(-2px);}
.setup-card{background:rgba(20,40,20,0.9);border:2px solid var(--amber);border-radius:24px;padding:26px;width:100%;max-width:480px;box-shadow:0 0 30px rgba(232,150,58,0.3),0 20px 60px rgba(0,0,0,0.5);}
.setup-card h2{font-family:"Jua",sans-serif;font-size:1.4rem;color:var(--amber);margin-bottom:18px;text-align:center;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.mode-btn{padding:14px 10px;border:2px solid var(--border);border-radius:14px;background:rgba(0,0,0,0.3);color:var(--cream);cursor:pointer;transition:all 0.2s;text-align:center;font-family:"Jua",sans-serif;font-size:0.95rem;}
.mode-btn .mi{font-size:1.6rem;display:block;margin-bottom:3px;}
.mode-btn.selected{border-color:var(--lime);background:rgba(126,200,80,0.15);box-shadow:0 0 15px rgba(126,200,80,0.2);}
.words-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;margin-bottom:6px;min-height:36px;}
.word-tag{background:rgba(126,200,80,0.2);border:1px solid var(--lime);border-radius:7px;padding:3px 8px;font-size:0.82rem;display:flex;align-items:center;gap:5px;}
.word-tag button{background:none;border:none;color:var(--coral);cursor:pointer;font-size:0.9rem;padding:0;}
.word-count{font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:3px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.toggle-label{font-size:0.88rem;}
.toggle{width:42px;height:22px;background:rgba(0,0,0,0.4);border:1.5px solid var(--border);border-radius:11px;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--lime);border-color:var(--lime);}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left 0.2s;}
.toggle.on::after{left:22px;}
.room-code-display{font-family:"Jua",sans-serif;font-size:2.8rem;letter-spacing:0.3em;color:var(--gold);text-align:center;text-shadow:0 0 20px rgba(245,200,66,0.5);padding:10px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px dashed var(--gold);margin:10px 0;}
.share-note{font-size:0.78rem;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:14px;}
.player-list-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,0.2);border-radius:10px;margin-bottom:6px;border:1px solid var(--border);}
.player-list-item.me{border-color:var(--lime);}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:0.7rem;font-weight:700;margin-left:5px;}
.badge-host{background:rgba(245,200,66,0.2);color:var(--gold);border:1px solid var(--gold);}
#gameScreen{padding:0;}
.game-layout{display:flex;flex-direction:column;width:100%;min-height:100vh;max-width:600px;margin:0 auto;}
.game-header{background:rgba(15,25,15,0.95);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);}
.header-code{font-family:"Jua",sans-serif;font-size:1.05rem;color:var(--gold);}
.status-badge{font-size:0.72rem;padding:3px 9px;border-radius:20px;font-weight:700;}
.status-playing{background:rgba(126,200,80,0.2);color:var(--lime);border:1px solid var(--lime);animation:sPulse 2s infinite;}
.status-finished{background:rgba(232,92,92,0.2);color:var(--coral);border:1px solid var(--coral);}
@keyframes sPulse{0%,100%{opacity:1}50%{opacity:0.6}}
.players-bar{padding:7px 10px;display:flex;gap:7px;overflow-x:auto;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border);scrollbar-width:none;}
.players-bar::-webkit-scrollbar{display:none;}
.player-chip{flex-shrink:0;padding:4px 11px;border-radius:18px;font-size:0.8rem;font-weight:700;background:rgba(0,0,0,0.3);border:1px solid var(--border);white-space:nowrap;transition:all 0.3s;}
.player-chip.me{background:rgba(126,200,80,0.2);border-color:var(--lime);color:var(--lime);}
.player-chip.current-turn{background:rgba(245,200,66,0.2);border-color:var(--gold);color:var(--gold);animation:tPulse 1s infinite;}
@keyframes tPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px rgba(245,200,66,0.4)}}
.game-body{flex:1;padding:14px;overflow-y:auto;}
.called-display{background:rgba(0,0,0,0.4);border:2px solid var(--gold);border-radius:18px;padding:14px;margin-bottom:14px;text-align:center;box-shadow:0 0 20px rgba(245,200,66,0.2);}
.called-label{font-size:0.72rem;color:rgba(255,255,255,0.5);letter-spacing:0.1em;margin-bottom:3px;}
.called-value{font-family:"Jua",sans-serif;font-size:2.6rem;color:var(--gold);text-shadow:0 0 20px rgba(245,200,66,0.6);line-height:1;margin-bottom:3px;word-break:break-all;}
.called-progress{font-size:0.75rem;color:rgba(255,255,255,0.4);}
.called-history{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;justify-content:center;max-height:55px;overflow-y:auto;}
.hist-chip{padding:2px 7px;background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.3);border-radius:5px;font-size:0.7rem;color:var(--gold);}
.turn-banner{background:linear-gradient(135deg,rgba(126,200,80,0.15),rgba(126,200,80,0.05));border:1px solid var(--lime);border-radius:10px;padding:9px 14px;margin-bottom:12px;text-align:center;font-size:0.88rem;}
.turn-banner strong{color:var(--lime);font-family:"Jua",sans-serif;}
.turn-input-box{background:rgba(0,0,0,0.35);border:2px solid var(--lime);border-radius:14px;padding:12px;margin-bottom:14px;box-shadow:0 0 20px rgba(126,200,80,0.12);}
.turn-input-box h3{font-family:"Jua",sans-serif;color:var(--lime);font-size:0.95rem;margin-bottom:8px;}
.btn-send{padding:11px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--lime),#5aad30);color:#0f1f0f;font-family:"Jua",sans-serif;font-size:0.95rem;cursor:pointer;white-space:nowrap;transition:transform 0.15s;}
.btn-send:hover{transform:translateY(-2px);}
.random-hint{font-size:0.73rem;color:rgba(255,255,255,0.35);margin-top:5px;text-align:right;}
.bingo-status{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:9px 13px;background:rgba(0,0,0,0.3);border-radius:10px;border:1px solid var(--border);}
.bingo-count{font-family:"Jua",sans-serif;font-size:0.95rem;}
.bingo-dots{display:flex;gap:5px;}
.bingo-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);background:transparent;transition:all 0.3s;}
.bingo-dot.filled{background:var(--lime);border-color:var(--lime);box-shadow:0 0 7px rgba(126,200,80,0.5);}
.bingo-board{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:13px;}
.bingo-cell{aspect-ratio:1;border-radius:9px;border:1.5px solid var(--border);background:rgba(0,0,0,0.35);color:rgba(255,255,255,0.7);font-family:"Jua",sans-serif;font-size:0.9rem;cursor:default;transition:all 0.2s;display:flex;align-items:center;justify-content:center;text-align:center;padding:2px;word-break:break-all;line-height:1.2;}
.bingo-cell.called:not(.marked){border-color:var(--amber);background:rgba(232,150,58,0.15);color:var(--amber);animation:cGlow 1.5s ease-in-out infinite;cursor:pointer;}
@keyframes cGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px rgba(232,150,58,0.4)}}
.bingo-cell.marked{background:linear-gradient(135deg,var(--lime),#5aad30);border-color:var(--lime);color:#0f1f0f;font-weight:900;cursor:default;animation:markIn 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 3px 10px rgba(126,200,80,0.4);}
@keyframes markIn{from{transform:scale(0.7);opacity:0.5}to{transform:scale(1);opacity:1}}
.scoreboard h3{font-family:"Jua",sans-serif;font-size:0.85rem;color:rgba(255,255,255,0.4);margin-bottom:7px;}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-radius:9px;margin-bottom:4px;background:rgba(0,0,0,0.2);border:1px solid transparent;transition:all 0.3s;}
.score-row.me{border-color:var(--lime);background:rgba(126,200,80,0.08);}
.score-name{font-weight:700;font-size:0.85rem;}
.score-bingos{font-family:"Jua",sans-serif;color:var(--gold);font-size:0.85rem;}
.overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.victory-card{background:linear-gradient(145deg,#0f2010,#1a3a1a);border:3px solid var(--gold);border-radius:26px;padding:36px 28px;max-width:340px;width:90%;text-align:center;box-shadow:0 0 60px rgba(245,200,66,0.4),0 30px 80px rgba(0,0,0,0.6);animation:cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);}
.defeat-card{border-color:var(--coral)!important;box-shadow:0 0 60px rgba(232,92,92,0.4),0 30px 80px rgba(0,0,0,0.6)!important;}
@keyframes cardIn{from{transform:scale(0.7) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.victory-title{font-family:"Jua",sans-serif;font-size:1.9rem;margin-bottom:6px;}
.victory-sub{color:rgba(255,255,255,0.6);font-size:0.87rem;margin-bottom:20px;}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;overflow:hidden;}
.confetti-piece{position:absolute;width:10px;height:10px;opacity:0;animation:cFall linear forwards;}
@keyframes cFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.toast-container{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:7px;align-items:center;}
.toast{background:rgba(20,40,20,0.96);border:1.5px solid var(--lime);border-radius:11px;padding:9px 18px;font-size:0.88rem;color:var(--cream);white-space:nowrap;animation:tIn 0.3s ease,tOut 0.3s ease 2.7s forwards;box-shadow:var(--glow);}
@keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0}}
.bouncing{animation:bounce 1.5s infinite;display:inline-block;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@media(max-width:380px){.bingo-cell{font-size:0.74rem}.called-value{font-size:2rem}}
</style>
</head>
<body>

<div id="lobbyScreen" class="screen active">
  <div class="lobby-card">
    <div style="font-size:5rem; text-align:center; animation:geckoFloat 3s ease-in-out infinite; filter:drop-shadow(0 4px 16px rgba(126,200,80,0.5));">🦎</div>
    <h1 class="title">게코 빙고</h1>
    <p class="subtitle">친구와 함께하는 실시간 멀티 빙고!</p>
    <div class="field-group">
      <label>닉네임</label>
      <input type="text" id="nameInput" placeholder="닉네임 (최대 8자)" maxlength="8"/>
    </div>
    <button class="btn btn-primary" onclick="createRoom()">🏠 방 만들기</button>
    <div class="divider">또는</div>
    <div class="field-group">
      <label>방 코드 (4자리)</label>
      <div class="input-row">
        <input type="text" id="codeInput" placeholder="1234" maxlength="4" style="text-align:center;letter-spacing:0.2em;font-size:1.2rem;"/>
        <button class="btn-inline" onclick="joinRoom()">참가</button>
      </div>
    </div>
    <p class="error-msg" id="lobbyError"></p>
  </div>
</div>

<div id="setupScreen" class="screen">
  <div class="setup-card">
    <h2>⚙️ 게임 설정</h2>
    <label style="margin-bottom:8px;">빙고 모드</label>
    <div class="mode-grid">
      <div class="mode-btn selected" onclick="selectMode('number-random')" id="mode-number-random"><span class="mi">🎲</span>숫자 (랜덤)</div>
      <div class="mode-btn" onclick="selectMode('number-custom')" id="mode-number-custom"><span class="mi">✏️</span>숫자 (직접입력)</div>
      <div class="mode-btn" onclick="selectMode('word')" id="mode-word"><span class="mi">📝</span>단어 빙고</div>
      <div class="mode-btn" onclick="selectMode('emoji')" id="mode-emoji"><span class="mi">😄</span>이모지 빙고</div>
    </div>
    <div id="wordInputSection" style="display:none;margin-bottom:14px;">
      <label>항목 입력 <span style="color:rgba(255,255,255,0.35);font-weight:normal;">(25개 필요)</span></label>
      <div class="input-row">
        <input type="text" id="wordInputField" placeholder="입력 후 Enter" maxlength="6" style="margin-bottom:0;"/>
        <button class="btn-send" onclick="addWord()">추가</button>
      </div>
      <div class="words-grid" id="wordTagsContainer"></div>
      <p class="word-count" id="wordCount">0 / 25개</p>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">🔄 턴제 (번갈아 호출)</span>
      <div class="toggle on" id="turnToggle" onclick="toggleTurn()"></div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">⏱️ 제한시간 30초</span>
      <div class="toggle" id="timerToggle" onclick="toggleTimer()"></div>
    </div>
    <button class="btn btn-primary" onclick="saveSetup()">💾 설정 저장</button>
    <button class="btn btn-ghost" onclick="showScreen('waitingScreen')">← 취소</button>
    <p class="error-msg" id="setupError"></p>
  </div>
</div>

<div id="waitingScreen" class="screen">
  <div class="lobby-card" style="max-width:440px;">
    <div style="text-align:center;margin-bottom:14px;">
      <span class="bouncing" style="font-size:2.5rem;">🦎</span>
      <h2 style="font-family:'Jua',sans-serif;color:var(--lime);margin-top:8px;">대기실</h2>
    </div>
    <label>방 코드를 공유하세요</label>
    <div class="room-code-display" id="waitRoomCode">----</div>
    <p class="share-note">카카오톡이나 링크로 친구에게 코드를 보내세요 📲</p>
    <label>참가자 (<span id="waitPlayerCount">0</span>명)</label>
    <div id="waitPlayerList" style="margin-bottom:16px;"></div>
    <div id="hostBtns" style="display:none;">
      <button class="btn btn-secondary" onclick="showScreen('setupScreen')">⚙️ 게임 설정</button>
      <button class="btn btn-primary" id="startBtn" disabled onclick="hostStart()">🎮 게임 시작!</button>
    </div>
    <div id="guestWait" style="display:none;text-align:center;color:rgba(255,255,255,0.4);font-size:0.88rem;padding:8px;">
      호스트가 게임을 시작할 때까지 대기 중...
    </div>
    <button class="btn btn-ghost" onclick="leaveRoom()" style="margin-top:10px;">← 나가기</button>
    <p class="error-msg" id="waitError"></p>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-layout">
    <div class="game-header">
      <button onclick="confirmLeave()" style="background:none;border:none;color:rgba(255,255,255,0.45);cursor:pointer;font-size:0.82rem;">← 나가기</button>
      <span class="header-code" id="gameCode">----</span>
      <span class="status-badge status-playing" id="gameStatusBadge">진행중</span>
    </div>
    <div class="players-bar" id="gamePlayerBar"></div>
    <div class="game-body">
      <div class="called-display" id="calledDisplay" style="display:none;">
        <div class="called-label">📢 호출된 항목</div>
        <div class="called-value" id="calledValue">-</div>
        <div class="called-progress" id="calledProgress"></div>
        <div class="called-history" id="calledHistory"></div>
      </div>
      <div class="turn-banner" id="turnBanner" style="display:none;"></div>
      <div class="turn-input-box" id="turnInputBox" style="display:none;">
        <h3 id="turnInputTitle">🎯 당신의 차례!</h3>
        <div class="input-row">
          <input type="text" id="callInput" placeholder="입력" maxlength="10" style="margin-bottom:0;"/>
          <button class="btn-send" onclick="submitCall()">📢 호출</button>
        </div>
        <p class="random-hint" id="randomHint"></p>
      </div>
      <div class="bingo-status">
        <span class="bingo-count">🦎 내 빙고: <strong id="myBingoCount">0</strong> / 5</span>
        <div class="bingo-dots" id="bingoDots">
          <div class="bingo-dot"></div><div class="bingo-dot"></div><div class="bingo-dot"></div>
          <div class="bingo-dot"></div><div class="bingo-dot"></div>
        </div>
      </div>
      <div class="bingo-board" id="bingoBoard"></div>
      <div class="scoreboard"><h3>📊 빙고 현황</h3><div id="scoreList"></div></div>
    </div>
  </div>
</div>

<div id="victoryOverlay" style="display:none;">
  <div class="confetti-container" id="confetti"></div>
  <div class="overlay">
    <div class="victory-card" id="victoryCard">
      <div style="font-size:2.8rem;margin-bottom:6px;" id="vEmoji">🎉</div>
      <div class="victory-title" id="vTitle">승리!</div>
      <div class="victory-sub" id="vSub"></div>
      <div style="font-size:4rem; margin:10px auto; display:block; filter:drop-shadow(0 4px 12px rgba(126,200,80,0.5));">🏆</div>
      <button class="btn btn-primary" onclick="closeVictory()" style="width:auto;padding:11px 28px;display:inline-block;margin-top:6px;">확인</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ════════ FIREBASE 연결 및 초기화 ════════
const firebaseConfig = {
  apiKey: "AIzaSyDtuLXJYcb2Tc0BhLl9VB5IG8g3CREghh0",
  authDomain: "work-4250.firebaseapp.com",
  databaseURL: "https://work-4250-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "work-4250",
  storageBucket: "work-4250.firebasestorage.app",
  messagingSenderId: "964530150246",
  appId: "1:964530150246:web:4ffbb0ff1e48c8880bc6a7",
  measurementId: "G-1LP971RER5"
};

let db = null;
window.addEventListener("load", () => {
  try {
    if (firebase.apps.length === 0) {
      firebase.initializeApp(firebaseConfig);
    }
    db = firebase.database();
    resumeSession();
  } catch (e) {
    alert("파이어베이스 연결 실패: " + e.message);
  }
});

// ════════ 데이터베이스 래퍼 ════════
async function dbSet(p,v){await db.ref(p).set(v);}
async function dbUpdate(p,v){await db.ref(p).update(v);}
async function dbGet(p){const s=await db.ref(p).once("value");return s.val();}
async function dbRemove(p){await db.ref(p).remove();}
const _lis={};
function dbListen(p,cb){
  const r=db.ref(p);r.on("value",s=>cb(s.val()));return()=>r.off("value");
}

// ════════ STATE ════════
let myId=null,myName="",roomCode=null,isHost=false;
let gameMode="number-random",turnModeOn=true,timerOn=false,pendingWords=[];
let _unsubRoom=null,shownVictory=false;

// ════════ BINGO LOGIC ════════
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function genBoard(mode,words){if(mode==="number-random"||mode==="number-custom")return shuffle(Array.from({length:25},(_,i)=>String(i+1)));return shuffle([...words]);}
function countBingos(m){let c=0;for(let r=0;r<5;r++)if([0,1,2,3,4].every(col=>m[r*5+col]))c++;for(let col=0;col<5;col++)if([0,1,2,3,4].every(r=>m[r*5+col]))c++;if([0,6,12,18,24].every(i=>m[i]))c++;if([4,8,12,16,20].every(i=>m[i]))c++;return c;}
function checkWin(m){return countBingos(m)>=5;}

// ════════ SCREENS ════════
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

// ════════ LOBBY ════════
async function createRoom(){
  const name=document.getElementById("nameInput").value.trim();
  if(!name){showError("lobbyError","닉네임을 입력하세요");return;}
  const code=String(Math.floor(1000+Math.random()*9000));
  myId="p_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
  myName=name;roomCode=code;isHost=true;
  const player={name,isHost:true,board:genBoard("number-random",[]),marked:Array(25).fill(false),bingos:0,lastSeen:Date.now()};
  await dbSet("rooms/"+code,{code,status:"waiting",mode:"number-random",turnMode:true,timerEnabled:false,customWords:[],turnOrder:[myId],currentTurnIdx:0,calledItems:[],currentItem:null,winnerId:null,players:{[myId]:player}});
  saveSession();subscribeRoom();showWaiting();
}

async function joinRoom(){
  const name=document.getElementById("nameInput").value.trim();
  const code=document.getElementById("codeInput").value.trim();
  if(!name){showError("lobbyError","닉네임을 입력하세요");return;}
  if(code.length!==4){showError("lobbyError","4자리 방 코드를 입력하세요");return;}
  const data=await dbGet("rooms/"+code);
  if(!data){showError("lobbyError","방을 찾을 수 없습니다 ❌");return;}
  if(data.status!=="waiting"){showError("lobbyError","이미 진행 중인 게임입니다");return;}
  myId="p_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
  myName=name;roomCode=code;isHost=false;
  const board=genBoard(data.mode,data.customWords||[]);
  const player={name,isHost:false,board,marked:Array(25).fill(false),bingos:0,lastSeen:Date.now()};
  const newOrder=[...(data.turnOrder||[]),myId];
  await dbUpdate("rooms/"+code,{["players/"+myId]:player,turnOrder:newOrder});
  saveSession();subscribeRoom();showWaiting();
}

// ════════ SUBSCRIBE ════════
function subscribeRoom(){
  if(_unsubRoom){_unsubRoom();_unsubRoom=null;}
  if(!roomCode)return;
  _unsubRoom=dbListen("rooms/"+roomCode,data=>{
    if(!data){showToast("방이 사라졌습니다");leaveRoom();return;}
    onRoomUpdate(data);
  });
}

setInterval(async()=>{
  if(!roomCode||!myId)return;
  await dbUpdate("rooms/"+roomCode+"/players/"+myId,{lastSeen:Date.now()});
  const data=await dbGet("rooms/"+roomCode);
  if(!data||!data.players)return;
  const hostE=Object.entries(data.players).find(([,p])=>p.isHost);
  if(!hostE)return;
  const[hostId,hP]=hostE;
  if(hostId===myId)return;
  if(Date.now()-(hP.lastSeen||0)>6000){
    const rem=Object.entries(data.players).filter(([id])=>id!==hostId);
    if(!rem.length){await dbRemove("rooms/"+roomCode);return;}
    const[nhId]=rem[0];
    const upd={};
    upd["players/"+hostId+"/isHost"]=false;
    upd["players/"+nhId+"/isHost"]=true;
    const nto=(data.turnOrder||[]).filter(id=>id!==hostId);
    upd["turnOrder"]=nto;
    let idx=data.currentTurnIdx||0;
    if(nto.length&&nto[idx%nto.length]===hostId)idx=(idx+1)%nto.length;
    upd["currentTurnIdx"]=idx;
    await dbUpdate("rooms/"+roomCode,upd);
    if(nhId===myId){isHost=true;showToast("👑 당신이 새 방장이 되었습니다!");}
  }
},3000);

// ════════ ROOM UPDATE ════════
function onRoomUpdate(data){
  isHost=data.players?.[myId]?.isHost||false;
  const cur=document.querySelector(".screen.active")?.id;
  if(data.status==="waiting"){if(cur!=="waitingScreen"&&cur!=="setupScreen")showScreen("waitingScreen");renderWaiting(data);}
  else if(data.status==="playing"){shownVictory=false;if(cur!=="gameScreen")showScreen("gameScreen");renderGame(data);}
  else if(data.status==="finished"){if(cur!=="gameScreen")showScreen("gameScreen");renderGame(data);if(!shownVictory){shownVictory=true;setTimeout(()=>showVictory(data),600);}}
}

function showWaiting(){showScreen("waitingScreen");document.getElementById("waitRoomCode").textContent=roomCode;}
function renderWaiting(data){
  if(!data.players)return;
  document.getElementById("waitRoomCode").textContent=roomCode;
  const ps=data.players,count=Object.keys(ps).length;
  document.getElementById("waitPlayerCount").textContent=count;
  document.getElementById("waitPlayerList").innerHTML=Object.entries(ps).map(([id,p])=>`<div class="player-list-item ${id===myId?"me":""}">${p.isHost?"👑":"🦎"} <span style="font-weight:700;${id===myId?"color:var(--lime)":""}">${p.name}${id===myId?" (나)":""}</span>${p.isHost?'<span class="badge badge-host">방장</span>':""}</div>`).join("");
  document.getElementById("hostBtns").style.display=isHost?"block":"none";
  document.getElementById("guestWait").style.display=isHost?"none":"block";
  const sb=document.getElementById("startBtn");if(sb)sb.disabled=count<2;
}

// ════════ SETUP ════════
function selectMode(mode){
  gameMode=mode;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("selected"));
  document.getElementById("mode-"+mode).classList.add("selected");
  document.getElementById("wordInputSection").style.display=(mode==="word"||mode==="emoji")?"block":"none";
  document.getElementById("wordInputField").placeholder=mode==="emoji"?"이모지 입력 (예: 🍎)":"단어 입력 후 Enter";
}
function toggleTurn(){turnModeOn=!turnModeOn;document.getElementById("turnToggle").classList.toggle("on",turnModeOn);}
function toggleTimer(){timerOn=!timerOn;document.getElementById("timerToggle").classList.toggle("on",timerOn);}
function addWord(){const inp=document.getElementById("wordInputField");const w=inp.value.trim();if(!w)return;if(pendingWords.length>=25){showError("setupError","25개가 최대입니다");return;}if(pendingWords.includes(w)){showError("setupError","이미 추가됨");return;}pendingWords.push(w);inp.value="";renderWordTags();}
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&document.activeElement.id==="wordInputField")addWord();if(e.key==="Enter"&&document.activeElement.id==="callInput")submitCall();});
function removeWord(i){pendingWords.splice(i,1);renderWordTags();}
function renderWordTags(){document.getElementById("wordTagsContainer").innerHTML=pendingWords.map((w,i)=>`<div class="word-tag">${w}<button onclick="removeWord(${i})">×</button></div>`).join("");document.getElementById("wordCount").textContent=pendingWords.length+" / 25개";}
async function saveSetup(){
  if((gameMode==="word"||gameMode==="emoji")&&pendingWords.length<25){showError("setupError","단어 25개 필요 (현재 "+pendingWords.length+"개)");return;}
  const data=await dbGet("rooms/"+roomCode);if(!data)return;
  const words=[...pendingWords];
  const upd={mode:gameMode,turnMode:turnModeOn,timerEnabled:timerOn,customWords:words};
  Object.keys(data.players||{}).forEach(id=>{upd["players/"+id+"/board"]=genBoard(gameMode,words);upd["players/"+id+"/marked"]=Array(25).fill(false);upd["players/"+id+"/bingos"]=0;});
  await dbUpdate("rooms/"+roomCode,upd);
  showScreen("waitingScreen");showToast("✅ 게임 설정 저장됨!");
}
async function hostStart(){
  const data=await dbGet("rooms/"+roomCode);if(!data)return;
  if(Object.keys(data.players||{}).length<2){showError("waitError","최소 2명 필요");return;}
  const newOrder=shuffle(data.turnOrder||[]);
  await dbUpdate("rooms/"+roomCode,{status:"playing",calledItems:[],currentItem:null,currentTurnIdx:0,turnOrder:newOrder,winnerId:null});
}

// ════════ GAME RENDER ════════
function renderGame(data){
  const me=data.players?.[myId];if(!me)return;
  document.getElementById("gameCode").textContent="Room "+data.code;
  const ps=data.players||{},to=data.turnOrder||[],idx=data.currentTurnIdx||0;
  const ctId=to[idx%to.length];
  document.getElementById("gamePlayerBar").innerHTML=Object.entries(ps).map(([id,p])=>{
    let cls="player-chip";if(id===myId)cls+=" me";if(id===ctId&&data.turnMode&&data.status==="playing")cls+=" current-turn";
    return `<div class="${cls}">${p.isHost?"👑 ":"🦎 "}${p.name}${id===myId?" (나)":""}${data.turnMode&&id===ctId?" 🎯":""}</div>`;
  }).join("");
  const ci=data.calledItems||[];
  const cd=document.getElementById("calledDisplay");
  if(ci.length>0){cd.style.display="";document.getElementById("calledValue").textContent=data.currentItem||"-";const tot=data.mode?.startsWith("number")?25:(data.customWords?.length||25);document.getElementById("calledProgress").textContent=ci.length+" / "+tot+" 호출됨";document.getElementById("calledHistory").innerHTML=[...ci].reverse().slice(0,20).map(i=>`<span class="hist-chip">${i}</span>`).join("");}
  const isMyTurn=ctId===myId,tb=document.getElementById("turnBanner"),tib=document.getElementById("turnInputBox");
  if(data.turnMode&&data.status==="playing"){
    tb.style.display="";const cp=ps[ctId];
    tb.innerHTML=isMyTurn?'🎯 <strong>당신의 차례입니다!</strong> 항목을 호출하세요':`⏳ <strong>${cp?.name}</strong>님의 차례...`;
    tib.style.display=isMyTurn?"":"none";if(isMyTurn)setupCI(data.mode);
  }else if(!data.turnMode&&isHost&&data.status==="playing"){tb.style.display="none";tib.style.display="";setupCI(data.mode);}
  else{tb.style.display="none";tib.style.display="none";}
  
  document.getElementById("bingoBoard").innerHTML=(me.board||[]).map((item,i)=>{
    const isMk=me.marked?.[i],isCl=ci.includes(item);let cls="bingo-cell";if(isMk)cls+=" marked";else if(isCl)cls+=" called";
    const can=isCl&&!isMk&&data.status==="playing";
    return `<button class="${cls}" ${can?`onclick="markCell(${i})"`:""} style="${!can?"cursor:default":""}">${item}</button>`;
  }).join("");
  document.getElementById("myBingoCount").textContent=me.bingos||0;
  const dots=document.getElementById("bingoDots").children;for(let i=0;i<5;i++)dots[i].classList.toggle("filled",i<(me.bingos||0));
  const sorted=Object.entries(ps).sort((a,b)=>(b[1].bingos||0)-(a[1].bingos||0));
  document.getElementById("scoreList").innerHTML=sorted.map(([id,p])=>`<div class="score-row ${id===myId?"me":""}"><span class="score-name">${p.isHost?"👑 ":"🦎 "}${p.name}${id===myId?" (나)":""}</span><span class="score-bingos">${"★".repeat(p.bingos||0)}${"☆".repeat(5-(p.bingos||0))} ${p.bingos||0}빙고</span></div>`).join("");
}

function setupCI(mode){
  const inp=document.getElementById("callInput"),hint=document.getElementById("randomHint");
  if(mode==="number-random"){document.getElementById("turnInputTitle").textContent="🎲 랜덤 또는 직접 숫자 입력";inp.placeholder="비워두면 자동 랜덤";inp.type="text";hint.textContent="빈칸이면 랜덤 숫자 자동 호출";}
  else if(mode==="number-custom"){document.getElementById("turnInputTitle").textContent="✏️ 숫자 직접 입력 (1~25)";inp.placeholder="1~25 숫자";inp.type="text";hint.textContent="보드에 있는 숫자를 선택하세요";}
  else{document.getElementById("turnInputTitle").textContent="📝 항목 선택";inp.placeholder="보드의 단어 입력";inp.type="text";hint.textContent="보드에 있는 항목 중 하나를 입력";}
}

async function markCell(ci){
  const data=await dbGet("rooms/"+roomCode);if(!data||data.status!=="playing")return;
  const me=data.players?.[myId];if(!me||me.marked?.[ci])return;
  const item=me.board[ci];if(!(data.calledItems||[]).includes(item)){showToast("❌ 아직 호출되지 않은 항목");return;}
  const nm=[...(me.marked||Array(25).fill(false))];nm[ci]=true;
  const bingos=countBingos(nm),prev=me.bingos||0;
  const upd={"players/"+myId+"/marked":nm,"players/"+myId+"/bingos":bingos};
  if(bingos>prev)showToast("🎊 "+bingos+"빙고 달성!");
  if(checkWin(nm)&&!data.winnerId){upd["winnerId"]=myId;upd["status"]="finished";}
  await dbUpdate("rooms/"+roomCode,upd);
}

async function submitCall(){
  const data=await dbGet("rooms/"+roomCode);if(!data||data.status!=="playing")return;
  const mode=data.mode;let val=document.getElementById("callInput").value.trim();
  const called=data.calledItems||[];
  if(mode==="number-random"){
    if(!val){const rem=Array.from({length:25},(_,i)=>String(i+1)).filter(n=>!called.includes(n));if(!rem.length){showToast("모든 숫자 호출 완료!");return;}val=rem[Math.floor(Math.random()*rem.length)];}
    else{const n=parseInt(val);if(isNaN(n)||n<1||n>25){showToast("1~25 숫자를 입력하세요");return;}if(called.includes(String(n))){showToast("이미 호출된 숫자");return;}val=String(n);}
  }else if(mode==="number-custom"){const n=parseInt(val);if(isNaN(n)||n<1||n>25){showToast("1~25 숫자를 입력하세요");return;}if(called.includes(String(n))){showToast("이미 호출됨");return;}val=String(n);}
  else{if(!val){showToast("항목을 입력하세요");return;}if(called.includes(val)){showToast("이미 호출된 항목");return;}}
  const nCalled=[...called,val],nIdx=data.turnMode?((data.currentTurnIdx||0)+1)%(data.turnOrder||[myId]).length:(data.currentTurnIdx||0);
  await dbUpdate("rooms/"+roomCode,{calledItems:nCalled,currentItem:val,currentTurnIdx:nIdx});
  document.getElementById("callInput").value="";showToast('📢 "'+val+'" 호출!');
}

// ════════ VICTORY ════════
function showVictory(data){
  const wId=data.winnerId,wName=data.players?.[wId]?.name||"?",isW=wId===myId;
  document.getElementById("victoryOverlay").style.display="block";
  const card=document.getElementById("victoryCard");card.classList.toggle("defeat-card",!isW);
  document.getElementById("vEmoji").textContent=isW?"🎉":"😔";
  document.getElementById("vTitle").style.color=isW?"var(--gold)":"var(--coral)";
  document.getElementById("vTitle").textContent=isW?"🏆 승리!":"패배...";
  document.getElementById("vSub").textContent=isW?"5빙고 달성! 당신이 최고! 🦎✨":`${wName}님이 먼저 5빙고! 다음엔 이겨요 💪`;
  if(isW)launchConfetti();
  setTimeout(async()=>{try{await dbRemove("rooms/"+roomCode);}catch(e){}},30000);
}
function closeVictory(){document.getElementById("victoryOverlay").style.display="none";leaveRoom();}
function launchConfetti(){
  const c=document.getElementById("confetti");c.innerHTML="";
  const cols=["#f5c842","#7ec850","#e85c5c","#5cc8e8","#e8963a","#fff"];
  for(let i=0;i<80;i++){const p=document.createElement("div");p.className="confetti-piece";const col=cols[Math.floor(Math.random()*cols.length)];const sz=Math.random()*10+6;p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${col};border-radius:${Math.random()>0.5?"50%":"2px"};animation-duration:${Math.random()*2+2}s;animation-delay:${Math.random()}s;`;c.appendChild(p);}
}

// ════════ LEAVE ════════
async function leaveRoom(){
  if(_unsubRoom){_unsubRoom();_unsubRoom=null;}
  if(roomCode&&myId){const data=await dbGet("rooms/"+roomCode);if(data&&data.players){const rem=Object.entries(data.players).filter(([id])=>id!==myId);if(!rem.length){await dbRemove("rooms/"+roomCode);}else{const upd={"players/"+myId:null,turnOrder:(data.turnOrder||[]).filter(id=>id!==myId)};if(isHost&&rem.length)upd["players/"+rem[0][0]+"/isHost"]=true;await dbUpdate("rooms/"+roomCode,upd);}}}
  clearSession();showScreen("lobbyScreen");document.getElementById("victoryOverlay").style.display="none";shownVictory=false;
}
function confirmLeave(){if(confirm("게임에서 나가시겠습니까?"))leaveRoom();}

// ════════ SESSION ════════
function saveSession(){localStorage.setItem("gecko_session",JSON.stringify({myId,myName,roomCode,isHost}));}
function clearSession(){localStorage.removeItem("gecko_session");myId=null;myName="";roomCode=null;isHost=false;}
async function resumeSession(){
  const s=localStorage.getItem("gecko_session");if(!s)return;
  try{const sess=JSON.parse(s);const data=await dbGet("rooms/"+sess.roomCode);if(!data||!data.players?.[sess.myId]){clearSession();return;}myId=sess.myId;myName=sess.myName;roomCode=sess.roomCode;isHost=sess.isHost;subscribeRoom();}catch{clearSession();}
}

// ════════ UTILS ════════
function showError(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;setTimeout(()=>{el.textContent="";},3000);}}
function showToast(msg){const c=document.getElementById("toastContainer");const t=document.createElement("div");t.className="toast";t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
</body>
</html>
